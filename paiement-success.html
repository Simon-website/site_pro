<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paiement confirmé — WebCraft</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); padding: 2rem; }
    .success-card { background: #fff; border-radius: 1.5rem; box-shadow: 0 8px 40px rgba(0,0,0,.08); padding: 2.5rem 2rem; width: 100%; max-width: 440px; text-align: center; }
    .success-icon { width: 64px; height: 64px; background: linear-gradient(135deg, #A8E6CF, #7FB3FF); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem; }
    .success-icon svg { color: #fff; }
    .success-logo { font-family: 'Poppins', sans-serif; font-weight: 800; font-size: 1.3rem; background: linear-gradient(135deg, #7FB3FF, #C3A6FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; display: block; }
    .success-title { font-family: 'Poppins', sans-serif; font-weight: 700; font-size: 1.4rem; color: #1F2937; margin: 0 0 .75rem; }
    .success-text { color: #6B7280; font-size: .95rem; line-height: 1.6; margin-bottom: 1.5rem; }
    .success-amount { font-size: 1.8rem; font-weight: 800; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #A8E6CF, #7FB3FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: .5rem 0 1.2rem; }
    .success-btn { display: inline-block; padding: .85rem 2rem; border-radius: .75rem; background: linear-gradient(135deg, #7FB3FF, #C3A6FF); color: #fff; font-weight: 600; font-family: 'Poppins', sans-serif; text-decoration: none; transition: opacity .2s; }
    .success-btn:hover { opacity: .9; }
  </style>
</head>
<body>
  <div class="success-card">
    <span class="success-logo">WebCraft</span>
    <div class="success-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <h1 class="success-title">Paiement confirmé !</h1>
    <div class="success-amount">0,50 €</div>
    <p class="success-text">Merci pour votre paiement. Vous recevrez une confirmation par email. Nous reviendrons vers vous très prochainement pour démarrer votre projet.</p>
    <a href="index.html" class="success-btn">Retour au site →</a>
  </div>
</body>
</html>
